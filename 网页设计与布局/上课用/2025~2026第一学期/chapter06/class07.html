<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增input类型</title>
</head>

<body>
  <form action="#" method="get">
    请输入你的邮箱:
    <input type="email" name="formnail" id="">
    <br>
    请输入个人网址:
    <input type="url" name="user_url" id="">
    <br>
    请输入电话号码:
    <input type="tel" name="telphone" pattern="^\d{11}$">
    <br>
    请输入关键词:
    <input type=" search" name="searchinfo" id="">
    <br>
    请选取一种颜色:
    <input type="color" name="color1" id="">
    <input type="color" name="color2" value="#ff3e96">
    <br>
    请输入数值:<input type="number" name="number1" value="1" min="1" max="20" step="4">
    <br>
    <input type="date" name="" id="">
    <input type="month" name="" id="">
    <input type="week" name="" id="">
    <input type="time" name="" id="">
    <input type="datetime" name="" id="">
    <input type="datetime-local" name="" id="">
    <br>
    <input type="submit" value="提交">


  </form>

</body>

</html>
