<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      margin: 100px;
      width: 200px;
      height: 150px;
      border-radius: 50%;
      background: #f60;
      animation: mymove;
      animation-duration: 8s;
      animation-iteration-count: 2;
      animation-direction: alternate;
    }

    @keyframes mymove {
      0% {
        transform: translate(0) rotateZ(0deg);
      }

      100% {
        transform: translate(1000px) rotateZ(1080deg);
      }
    }
  </style>
</head>

<body>
  <div></div>
</body>

</html>
