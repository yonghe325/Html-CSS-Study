<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>广告</title>
  <style>
    .big{
      margin: 50px auto;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 1000px;
      height: 300px;
      background-color: rgb(88, 88, 90);
      text-align: center;
    
    }
    .x{
      position: absolute;
      padding: 0;
      margin: 0;
      z-index: 1;
      width: 20px;
      height: 20px;
      right: 0px;
      top: 0px;
      border: 2px solid black;

      text-align: center;
      line-height: 20px;
      cursor: pointer;
      /* 鼠标变成小手 */
    }
    .big>p{
      font-size: larger;
    }

  </style>
</head>
<body>
  <div class="big">
    <h1>我是广告</h1>
    <!-- <button type="button" class="x">x</button> -->
    <div class="x">x</div>
  </div>
  <script>
    const cle = document.querySelector('.x')
    console.log(cle.innerHTML);
    cle.addEventListener('click',function(){
      const big = document.querySelector('.big')
      // console.log(big);
      big.style.display = 'none'
      //隐藏
      
    })
    

  </script>
</body>
</html>
