<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>事件监听</title>
</head>
<body>
  <button type="button">我是按钮</button>

  <script>
    //需求 : 点击按钮, 弹出一个对话框
    const but = document.querySelector('button')
    but.addEventListener('click',function(){
      alert('我是一个对话框')
    })

  </script>
</body>
</html>
