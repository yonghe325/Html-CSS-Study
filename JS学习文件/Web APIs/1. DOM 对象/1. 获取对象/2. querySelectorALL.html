<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>querySelectorALL</title>
</head>
<body>
  <ul id="nav">
    <li>1</li>
    <li>2</li>
    <li>3</li>
  </ul>
  <script>
    const lis=document.querySelectorAll('#nav li')
    for (let i = 0; i < lis.length; i++) {
      lis[i].style.color = 'red'
      console.log(lis[i])
    }
    // console.log(lis)
    

  </script>

</body>
</html>
