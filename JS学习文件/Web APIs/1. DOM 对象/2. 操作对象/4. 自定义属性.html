<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自定义属性</title>
</head>
<body>
  <div class="box" data-id="10">这是盒子</div>

    const box = document.querySelector('.box')
    console.log(box.dataset.id);
  </script>
</body>
</html>
