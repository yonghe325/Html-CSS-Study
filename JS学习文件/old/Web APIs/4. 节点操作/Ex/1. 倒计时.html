<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒计时</title>
  <style>
    body{
      margin: 0;
      padding: 0;
      /* display: flex;
      justify-content: center; */
      list-style: none;
      box-sizing: border-box;
    }
    .countdown_box{
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      align-items: center;
      
      margin: 50px auto;
      width: 400px;
      height: 500px;
      background-color: pink;
      border: 2px solid black;
    }
    .countdown_box h1{
      height: 50px;
      text-align: center;
      line-height: 50px;
      font-size: 20px;
    }
    .target_time input{
      width: 35px;
      height: 30px;
      font-size: 30px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="countdown_box">
    <h1 class="current_time">今天是???月???日</h1>
    <h1 class="target_time">距离<input type="text" class="month">月<input type="text" class="day">日</h1>
    <input type="button" value="">
    <h1>还有</h1>
    <h1 class="countdown">???天???小时???分钟</h1>
  </div>

  <script>
    (function(){
      document.querySelector('.current_time').innerText = `今天是${((new Date()).getMonth()+1).toString(10).padStart(2,'0')}月${(new Date()).getDate().toString(10).padStart(2,'0')}日`
      const month = document.querySelector('.month')
      const day = document.querySelector('.day')
      day.addEventListener('keyup',function(){
        if (Number(month.value)<=12 && Number(month.value)>=1  ) {
          console.log('yes');
        }

      })
    })();
  </script>
</body>
</html>
