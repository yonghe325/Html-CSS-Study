<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机点名</title>
  <style>
    .big{
      margin: 0 auto;
      width: 1000px;
      height: 600px;
      background-color: aliceblue;
      border: 1px solid black;
      text-align: center;
    }
    /* .but{
      width: 800px;
      height: 300px;
    } */
    .big>h1,.big>h2{
      margin-top: 100px;
    }

    .start,.end{
      margin: 100px 50px;
      width: 200px;
      height: 100px;
      background-color: rgb(162, 159, 159);
    }

  </style>
</head>
<body>
  <div class="big">
    <h1>随机点名</h1>
    <h2>???</h2>
    <div class="but">
      <button type="button" class="start">开始</button>
      <button type="button" class="end" disabled>结束</button>
    </div>
  </div>
  <script>
    const list = ['我是1','我是2','我是3','我是4','我是5','我是6','我是7','我是8','我是9','我是10','我是11']
    const ls = document.querySelector('.big>h2')
    // console.log(ls);
    const start = document.querySelector('.start')
    const end = document.querySelector('.end')
    let id
    function ran(){
      id = setInterval(function() {
        let ran_num = Math.ceil(Math.random() * (list.length - 1))
        ls.innerHTML = list[ran_num]
      },50)
      start.disabled = true
      end.disabled = false
    }

    start.addEventListener('click', ran)

    end.addEventListener('click',function(){
      clearInterval(id)
      start.disabled = false
      end.disabled = true
    })



  </script>

</body>
</html>
