<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>test forin</title>
  <style>
    *{
      padding: 0;
      margin: 0;
      list-style: none;

    }
    h1{
      text-align: center;
    }
    table{
      margin: 0 auto;
      width: 1000px;
      height: 400px;
      border-collapse: collapse;
      
      border: 1px solid rgb(93, 90, 90);
    }
    .head{
      background-color: rgb(106, 103, 103);
    }
    td,th{
      text-align: center;
      border: 1px solid rgb(93, 90, 90);
    }
    tr:nth-child(n+2):hover{
      background-color: rgb(174, 168, 168);
    }

  </style>

</head>

<body>
  <h1>学生列表</h1>
  <!-- <table>
    <tr class="head">

  <script>
    let students = [
      { name: '小明', age: 18, gender: '男', hometown: '河北省' },
      { name: '小红', age: 19, gender: '女', hometown: '河南省' },
      { name: '小刚', age: 17, gender: '男', hometown: '山西省' },
      { name: '小丽', age: 18, gender: '女', hometown: '山东省' }
    ]
    document.write(`
    <table>
      <tr class="head">
        <th>序号</th>
        <th>姓名</th>
        <th>年龄</th>
        <th>性别</th>
        <th>家乡</th>
      </tr>      
    `)
    for (let index = 0; index < students.length; index++) {
      document.write("<tr>")
        document.write(`<td>${index+1}</td>`)
        for(let j in students[index]){
          document.write(`<td>${students[index][j]}</td>`)

          // document.write(students[index][j])
          // console.log(students[index][j])
        }
      document.write("</tr>")

    }
    document.write(`</table>`)

  </script>

</body>
