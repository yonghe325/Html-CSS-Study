<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>函数提升</title>
	</head>
	<body>
		<script>
			f1()//因为函数声明创建的普通函数存在整体提升
			function f1(){//函数声明
				console.log('我是一个带名字的普通函数')
			}
			f1()
			
			//f2()//f2 is not a function
			console.log(f2)//undefined,f2作为变量只存在声明提升
			var f2 = function(){//函数表达式
				console.log('我是通过函数表达式创建的匿名函数')
			}
			f2()
		</script>
	</body>
</html>
