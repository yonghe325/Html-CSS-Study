<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>匿名函数自调用</title>
	</head>
	<body>
		<button id="btn1">按钮1</button><span id="cont1"></span>
		<hr>
		<button id="btn2">按钮2</button><span id="cont2"></span>
		<hr>
		<button id="btn3">按钮3</button><span id="cont3"></span>
		<hr>
		<script>
			//全局污染解决方案:匿名函数自调用
			//格式: 先用一对小括号把匿名函数整体包裹起来，表示这是一个整体
			//再在后面跟一对小括号，表示要调用前面的这个匿名函数
			//(function(){匿名函数的函数体})()
			;(function(){
				var a = 1
				btn1.onclick = function(){
					cont1.innerHTML = ++a
				}
			})()
			//如果后面的内容以小括号开头，上下两行默认会连到一起执行
			//为了防止和上一行代码连接到一起，要在匿名函数自调用前加分号结束上一行代码
			;(function(){
				var a = 2
				btn2.onclick = function(){
					cont2.innerHTML = ++a
				}
			})()
			
			;(function(){
				var a = 4
				btn3.onclick = function(){
					cont3.innerHTML = ++a
				}
			})()
			
			
		</script>
	</body>
</html>
