<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>赋值运算符</title>
	</head>
	<body>
		<script>
			//赋值
			var a = 1
			a = a+1
			a++
			++a
			//以上三种写法都可以让变量a的值+1
			console.log(a)//4
			a += 1 //运算赋值  先运算a+1=5，再赋值a=5
			console.log(a)//5
			
			//练习:声明变量保存商品的价格price,对商品的价格打8折，输出最终的价格
			//要求:使用运算赋值的写法
			var price = 1000
			//price = price * 0.8
			price *= 0.8 //先运算(price*0.8)，再赋值(price=800)
			console.log(price)
		</script>
	</body>
</html>
