<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>作业1答案</title>
	</head>
	<body>
		单价<input type="text" id="price"/><br>
		数量<input type="text" id="num"/><br>
		<button id="btn">支付</button>
		<script>
			//给支付按钮绑定点击事件
			btn.onclick = function(){
				//计算:总价=单价*数量
				var total = price.value * num.value
				//console.log(total)
				if(total>=1000){//如果算出来的总价满1000
					total *= 0.9 //打9折
				}
				//console.log(total)
				//声明变量保存:会员卡余额
				var card = 1500
				//声明变量保存:余额=卡里的钱-消费总价
				var rest = card - total
				//判断余额是否够支付
				if(rest>=0){
					alert('支付成功，余额剩余:'+rest+'元')
				}else{
					alert('余额不足，会员卡余额还剩'+card+'元，请充值')
				}
			}
		</script>
	</body>
</html>
