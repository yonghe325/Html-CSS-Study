			//练习:假设有一张纸，纸的厚度为0.001米(1毫米)
			//问:折叠多少次能达到珠穆朗玛峰的高度(8848)
			//开始条件--0.001纸未折叠时的初始厚度
			//结束条件>8848 折纸厚度超过8848就结束
			//更改条件*2
			var i = 0.001
			var count = 0 //用来统计折纸的次数
			do {
				i *= 2 //增量，每折纸一次，纸的厚度*2
				count++//每循环一次，相当于折纸一次，统计的次数+1
			}while(i<8848)//只要厚度没有超过8848就继续循环
