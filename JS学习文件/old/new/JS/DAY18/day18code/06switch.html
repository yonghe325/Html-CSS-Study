<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>switch-case语句</title>
	</head>
	<body>
		<input type="text" id="city" placeholder="请输入城市">
		<button id="btn">查看</button>
		<div id="cont"></div>
		<script>
			//在输入框中获取用户输入的城市，点击按钮，在页面显示推荐的美食
			//北京-烤鸭 成都-火锅 东北-大乱炖 武汉-热干面 其他-兰州拉面
			btn.onclick = function(){//给按钮绑定点击事件
				var a = city.value //获取用户输入的城市名称
				//console.log(a)
				switch(a){
					case '北京':
						//console.log('烤鸭')
						cont.innerHTML = '烤鸭'
						break
					case '成都':
						cont.innerHTML = '火锅'
						break
					case '东北':
						cont.innerHTML = '大乱炖'
						break
					case '武汉':
						cont.innerHTML = '热干面'
						break
					default:
						cont.innerHTML = '兰州拉面'
				}
			}
			
			
			
			//声明一个变量
			var n = 7
			switch (n) {
				case 1:
					console.log('迪拜')
					break //中断 switch-case
				case 2:
					console.log('土耳其')
					break
				case 3:
					console.log('威尼斯')
					break
				default: //默认项，可以理解成"保底选项"
					console.log('在家学习吧')
			}
		</script>
	</body>
</html>
