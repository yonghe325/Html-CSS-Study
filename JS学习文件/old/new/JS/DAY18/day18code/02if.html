			//练习:声明变量保存商品的总价total
			//如果总价在1000~2000之间，总价打9折，并输出‘恭喜您!获得赠品洗发水*1’
			//如果总价不在规定范围，则原价支付，输出:'您应支付:XXX元'
			var total = 1000
			if(total>=1000 && total<=2000){
				total *= 0.9
				console.log('恭喜您!获得赠品洗发水*1')
			}
			console.log('您应支付:'+total+'元')
		</script>
