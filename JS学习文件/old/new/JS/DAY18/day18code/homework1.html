		<script>
			// 定义变量保存年份year,判断该年份是否为闰年

			// 闰年的判断条件:能被4整除，并且不能被100整除，或者能被400整除
			var year = 2001
			// console.log (year % 4 === 0 && year %100 != 0 || year % 400 === 0)
			//逻辑与的优先级高于逻辑或
			console.log (year % 400 === 0 || year % 4 === 0 && year %100 != 0)
		</script>
