<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>其他事件other</title>
		<style>
			div {
				width: 300px;
				height: 100px;
				background-color: lightgreen;
				display: none;/* 让div先消失 */
			}
		</style>
	</head>
	<body>
		<input type="text" id="uname">
		<div id="box">123</div>
		<script>
			//给输入框绑定获得焦点事件
			uname.onfocus = function(){
				console.log('获取了光标')
				box.style.fontSize = '25px'
				box.style.display = 'block'
			}
			//给输入框绑定失去焦点事件
			uname.onblur = function(){
				console.log('失去了光标')
				box.style.display = 'none'
			}
		</script>
	</body>
</html>
