<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>变量的作用域2</title>
	</head>
	<body>
		<script>
			var a = 1
			console.log(a)
			
			//在打印之前明明没有定义变量b,为什么没有报错?
			//JS的预加载/预解析:
			//在程序执行之前，会将用var声明的变量提升到所在作用域的最前面
			//但注意:只提升声明部分var b，赋值不提升
			console.log(b)//undefined,相当于上面有声明了，没有赋值
			var b = 1
			
			//console.log(c)//相当于变量未声明就使用，报错:c is not defined
			c = 1//没有用var,所以不存在提升现象
			
			//思考:下列代码的执行结果是?
			function f1(){
				//var d 这句代码不存在，只是为了演示变量提升到这里了
				console.log(d)//undefined
				var d = 3
				console.log(d)//3
			}
			f1()
			
			//思考:下列代码的执行结果是?
			var e = 4
			function f2(){
				//变量的查找原则:就近原则
				//如果当前作用域下有，就不再向更远的全局作用域下找
				//var e 提升代码
				console.log(e)//undefined,变量提升+就近原则
				var e = 5
				console.log(e)//5,使用局部变量
			}
			f2()
			
			//思考:下列代码的执行结果是?
			function f3(x){
				//var x = 2 如果这句话没注释，那么x的值会覆盖成2
				//如果这句话注释掉了,那x的值就是调用函数时传入的实参666
				console.log(x)
			}
			f3(666)
			//console.log(x) //报错:形参x属于局部变量，只能在函数内访问
			
			//思考:下列程序的执行结果是什么?
			var y = 7 //全局变量
			function f4(y){//形参y是局部变量
				y+=3//让形参(局部变量)的值自动加3
				console.log(y)//8=实参5+3
			}
			f4(5)
			console.log(y)//7,使用的是全局变量的值
		</script>
	</body>
</html>
