<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>绑定事件处理函数</title>
	</head>
	<body>
		<button id="btn1">按钮</button>
		<button id="btn2">按钮2</button>
		<script>
			btn1.onclick = function(){
				alert('按钮1被点击了')
			}
			var fn = function(){
				alert('fn被调用了')
			}
			btn2.onclick = fn
		</script>
	</body>
</html>
