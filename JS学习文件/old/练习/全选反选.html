  <script>
    (function () {
      const all_check = document.querySelector("#all_checked")
      console.log(all_check.checked)
      all_check.addEventListener("click", function () {
        const checked = document.querySelectorAll(".checked")
        //每次点击全选按钮判定一次
          checked.forEach((element) => {
            element.checked = this.checked
          })
      })
    })();
    //单对多 全选
    (function () {
      const all_check = document.querySelector("#all_checked")
      const checked = document.querySelectorAll(".checked")
      checked.forEach(element => {
        element.addEventListener('click', function () {
          const checked_num = document.querySelectorAll('.checked:checked')
          // console.log(checked_num.length);
          all_check.checked = checked_num.length === checked.length 
        })
      })
    })();
    //多对单 全选
