<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>class04</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
    }

    table {
      border: 1px black solid;
      text-align: center;
    }

    tr>td,
    tr>th {
      border: 1px black solid;
      width: 100px;
      /* height: 25px; */
      /* height: 200px; */
      padding: 5px 0;
    }

    tr>td:nth-child(2) {
      background-color: rgba(208, 114, 164, 0.601);
    }

    tr>td:nth-child(2n+1):hover {
      background-color: brown;
    }

    tr>td:nth-child(2n+1) {
      background-color: brown;
    }

    tr>td:nth-child(2n+1):hover {
      background-color: rgba(208, 114, 164, 0.601);
    }
  </style>
</head>

<body>
  <table align="center">
    <thead>
      <tr>
        <th colspan="3">
          课程表
        </th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>一 </td>
        <td>二 </td>
        <td>三 </td>
      </tr>
      <tr>
        <td>网页</td>
        <td>java</td>
        <td>LInux</td>
      </tr>
      <tr>
        <td>LInux</td>
        <td>网页</td>
        <td>java</td>
      </tr>
      <tr>
        <td>java</td>
        <td>LInux</td>
        <td>网页</td>
      </tr>
    </tbody>

  </table>

</body>

</html>
