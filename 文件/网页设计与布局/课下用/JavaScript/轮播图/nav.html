<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        /* list-style: none; */
      }
      .big {
        margin: 0 auto;
        width: 530px;
        height: 400px;
        border-radius: 10px;
        overflow: hidden;

        background-color: rgb(175, 181, 181);
      }
      .imgs {
        width: 530px;
        height: 300px;
        border-radius: 10px;
      }
      .imgs > img {
        width: 530px;
        height: 300px;
      }
      .sml {
        display: flex;

        width: 530px;
        height: 100px;

        background-color: rgb(188, 192, 192);
      }
      .left {
        width: 300px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .left p {
        margin: 5px 0 0 10px;
      }
      .left ul {
        display: flex;
        justify-content: center;
        list-style-type: none;
        margin-bottom: 5px;
      }
      .left ul li {
        padding-bottom: 5px;
      }
      .left ul li::before {
        content: "•";
        display: inline-block;
        margin-right: 10px;
        color: antiquewhite;
        font-size: 45px;
        cursor: pointer;

      }
      .left ul li.active::before {
        content: "•";
        display: inline-block;
        margin-right: 10px;
        color: rgb(0, 0, 0);
        transform: scale(1.5);
      }
      .right {
        display: flex;
        justify-content: space-around;
        align-items: center;
        width: 230px;
      }
      .right button {
        width: 50px;
        height: 50px;
        border-radius: 30%;
        background-color: rgb(163, 163, 163);
        border: none;
        font-size: larger;
      }
      .butclick {
        background-color: rgb(207, 203, 203);
      }
    </style>
  </head>
  <body>
    <div class="big">
      <div class="imgs">
        <img src="./img/01.jpg" alt="" />
      </div>
      <div class="sml">
        <div class="left">
          <p>这是第一张图片</p>
          <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
          </ul>
        </div>
        <div class="right">
          <button type="button" class="last"><</button>
          <button type="button" class="next">></button>
        </div>
      </div>
    </div>
    <script>
      const sliderDate = [
        { src: "./img/01.jpg", title: "这是第一张图片" },
        { src: "./img/02.jpg", title: "这是第二张图片" },
        { src: "./img/03.jpg", title: "这是第三张图片" },
        { src: "./img/04.jpg", title: "这是第四张图片" },
        { src: "./img/05.jpg", title: "这是第五张图片" },
        { src: "./img/06.jpg", title: "这是第六张图片" },
        { src: "./img/07.jpg", title: "这是第七张图片" },
        { src: "./img/08.jpg", title: "这是第八张图片" },
      ];

      const imgs = document.querySelector("img");
      const li_set = document.querySelectorAll(`.left ul li`);
      const p = document.querySelector("p");
      let img_id = 0;
      let n;

      function start() {
        n = setInterval(function () {
          li_set[img_id].classList.add("active");
          imgs.src = sliderDate[img_id].src;
          p.innerHTML = sliderDate[img_id].title;

          li_set[
            img_id - 1 >= 0 ? img_id - 1 : sliderDate.length - 1
          ].classList.remove("active");

          
          img_id = (img_id + 1) % 8; 
        }, 1000);
      }
      function next(num = 0) {
        // if (num) {
        // }
        // else{
          clearInterval(n);
          li_set[img_id].classList.add("active");
          imgs.src = sliderDate[img_id].src;
          p.innerHTML = sliderDate[img_id].title;
          li_set[
          img_id - 1 >= 0 ? img_id - 1 : sliderDate.length - 1
          ].classList.remove("active");
            
          img_id = (img_id + 1) % 8;
          start()
        // }

      }
        // 7
        // 0

      function last() {
        clearInterval(n);
        li_set[((img_id-1+sliderDate.length)%sliderDate.length)].classList.remove("active");
        img_id = (img_id-2 + sliderDate.length)%sliderDate.length
        li_set[img_id].classList.add("active");
        imgs.src = sliderDate[img_id].src;
        p.innerHTML = sliderDate[img_id].title;
        li_set[
        img_id - 1 >= 0 ? img_id - 1 : sliderDate.length - 1
        ].classList.remove("active");
        img_id = (img_id + 1) % 8;
        start()
      }

      //打开页面, 直接开始轮播
      start();
      //悬停时暂停轮播
        //放到图片上暂停
      imgs.addEventListener("mouseenter", function () {
        clearInterval(n);
        console.log("已暂停");
      });
        //放到当前轮播的圆点上暂停
      li_set[img_id].addEventListener('mouseenter',function () {
        clearInterval(n);
        console.log("已暂停");
      })  
      //离开悬停时, 开启轮播
      imgs.addEventListener("mouseleave", function () {
        start();
        console.log("开始轮播");
      });
      //当点击一个圆点时, 跳转到该圆点
      //当点击左右箭头时, 更改图片
      const right = document.querySelector('.next')
      const left = document.querySelector('.last')
      right.addEventListener('click',next)
      left.addEventListener('click',last)

    </script>
  </body>
</html>
