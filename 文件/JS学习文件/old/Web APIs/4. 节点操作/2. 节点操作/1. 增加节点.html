<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节点操作</title>
  <style>
    div{
      width: 500px;
      height: 500px;
      background-color: red;
    }

  </style>
</head>
<body>
  <script>
    const div = document.createElement('div')
    //先创建
    document.body.appendChild(div)
  </script>
</body>
</html>
