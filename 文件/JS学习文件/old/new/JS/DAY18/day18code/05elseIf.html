<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>if-else嵌套</title>
	</head>
	<body>
		<script>
			//练习:声明变量保存价格，满1000打9折，满2000打8折，满5000打7折
			//输出结果:'商品原价:XXX,您实际应付:XXX'
			var price = 500 //商品原价 测试数据:500 1000 2000 5000
			var count = price //实际支付的价格,需要设置初始值为商品原价
			if(price >= 5000){ //满5000
				count = price * 0.7 //打7折
			}else if(price >=2000){
				count = price * 0.8
			}else if(price >= 1000){
				count = price * 0.9
			}
			console.log('商品原价:'+price+',您实际应付:'+count)
			
			//练习:声明变量，保存学生的成绩score,并输出结果:'分数XXX的评级为:XXX'
			//90~100 优秀
			//80~90 良好
			//70~80 中等
			//60~70 及格
			//60以下 不及格
			//注意:数据要进行合法性判断，如果成绩不在0~100之间，输出:'非法的数据'
			var score = 180
			if(score>100 || score<0){
				console.log('非法的数据')
			}else if(score>=90){
				console.log('分数'+score+'的评级为:优秀')
			}else if(score>=80){
				console.log('分数'+score+'的评级为:良好')
			}else if(score>=70){
				console.log('分数'+score+'的评级为:中等')
			}else if(score>=60){
				console.log('分数'+score+'的评级为:及格')
			}else{
				console.log('分数'+score+'的评级为:不及格')
			}
		</script>
	</body>
</html>
