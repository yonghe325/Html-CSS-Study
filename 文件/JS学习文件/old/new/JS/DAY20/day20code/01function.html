<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>函数调用练习</title>
	</head>
	<body>
		<script>
			function f1(){
				console.log(1)
				console.log(2)
				console.log(3)
			}
			function f2(){
				console.log(666)
			}
			function f3(){
				f1()
				f2()
				f1()
			}
			 f3()
		</script>
