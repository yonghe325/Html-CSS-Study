<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>作业答案</title>
	</head>
	<body>
		<script>
			//题目1:
			//定义变量分别保存变量:
			//姓名name,年龄age,城市city,月薪salary,打印:
			//王小明今年22岁了,他的目标薪资是在北京找一个月薪12000.99的工作
			var name = '王小明'
			var age = 22
			var city = '北京'
			var salary = 12000.99
			console.log(name+'今年'+age+'岁了,他的目标薪资是在'+city+'找一个月薪'+salary+'的工作')
			
			// 题目2:
			// 计算：光速运行一年的长度是多少米？已知光速是3亿m/s
			console.log(300000000*60*60*24*365)//9460800000000000
			
			// 题目3:
			// 通过父母的身高大致推断出子女的身高，假定父母与子女的身高遗传关系如下:
			// 儿子身高(厘米)＝(父亲身高＋母亲身高) *1.08/2
			// 女儿身高(厘米)＝(父亲身高*0.923＋母亲身高)/2
			// 那已知：现有父亲身高175CM,母亲身高160CM		
			// 请预测子女身高打印输出,输出格式:儿子预计身高n厘米 女儿预计身高n厘米
			var fatherHeight = 175
			var motherHeight = 160
			var sonHeight = (fatherHeight + motherHeight) * 1.08 / 2
			var daughterHeight = (fatherHeight * 0.923 + motherHeight) / 2
			console.log('儿子预计身高'+sonHeight+'厘米')
			console.log('女儿预计身高'+daughterHeight+'厘米')
		</script>
	</body>
</html>
