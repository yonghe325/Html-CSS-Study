<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>计算器calc</title>
	</head>
	<body>
		第1个数字<input type="text" id="num1"><br>
		第2个数字<input type="text" id="num2"><br>
		<button id="btn">=</button><br>
		两个数字相加的和:<span id="sum">结果</span>
		<script>
			//给按钮绑定点击事件
			btn.onclick = function(){
				//分别获取两个数字
				var a = num1.value
				var b = num2.value
				//弹警示框显示两个数相加的结果
				//强制将两个值转为数字，才能相加，否则是拼接效果
				//alert(Number(a)+Number(b))
				//修改id值为sum的HTML元素的内容
				sum.innerHTML = Number(a)+Number(b)
			}
		</script>
	</body>
</html>
