<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>循环嵌套</title>
	</head>
	<body>
		<script>
			//循环5次，每次产生一个*,打印效果:*****
			for (var i = 1, str = ''; i <= 5; i++) {
				//console.log('*')
				//每次循环，都在str中拼接一个*
				str += '*' //''+'*'+'*'+'*'+'*'+'*'
			}
			//循环结束，打印最终拼接的效果
			console.log(str)

			//打印 1 123456 2 123456 3 123456
			for (var i = 1; i <= 3; i++) { //外层循环
				console.log(i)
				for (var j = 1; j <= 6; j++) { //内层循环
					console.log(j)
				}
			}

			//*****
			//*****
			//*****
			//外层循环:控制图形的行数
			for (var i = 1; i <= 3; i++) {
				console.log('第' + i + '轮:')
				//内层循环控制这一行的个数
				for (var j = 1, str = ''; j <= 5; j++) {
					str += '*'
				}
				//内层循环结束，刚刚拼接好的这一行结束，打印
				console.log(str)
			}
			// *
			// **
			// ***
			for (var i = 1; i <= 3; i++) { //外层循环控制行数，执行3次
				//j的最大值是随着i的变化而变化的，i行i星
				for (var j = 1, str = ''; j <= i; j++) { //内层循环控制这一行的列数
					str += '*'
				}
				// 内层循环结束，也就是这一行拼接结束后，打印拼接好的这行
				console.log(str)
			}

			//1*1=1 
			//1*2=2 2*2=4 
			//1*3=3 2*3=6  3*3=9 
			//1*4=4 2*4=8  3*4=12 4*4=16 
			//1*5=5 2*5=10 3*5=15 4*5=20 5*5=25 
			//1*6=6 2*6=12 3*6=18 4*6=24 5*6=30 6*6=36 
			//1*7=7 2*7=14 3*7=21 4*7=28 5*7=35 6*7=42 7*7=49 
			//1*8=8 2*8=16 3*8=24 4*8=32 5*8=40 6*8=48 7*8=56 8*8=64 
			//1*9=9 2*9=18 3*9=27 4*9=36 5*9=45 6*9=54 7*9=63 8*9=72 9*9=81 
			//外层循环，i控制行数，一共9行
			for (var i = 1; i <= 9; i++) {
				//内层循环，j控制这一行的列数，j的最大值是i,第i最多有i列
				for (var j = 1, str = ''; j <= i; j++) {
					//str += '*'
					str += j + '*' + i + '=' + (j*i)+' '
					//如果是第3行或者第4行，并且是第2列，多拼接一个空格
					if((i===3 || i===4) && j===2){
						str += ' '
					}
				}
				//等内层循环结束，打印刚刚拼接好的这一行
				console.log(str)
			}
		</script>
	</body>
</html>
