			/* 当循环条件为true的情况下，计算出10~20之间所有整数的乘积 */
			//开始条件10 结束条件20 更改条件++
			var i = 10 
			var s = 1 //声明变量，用来保存乘积，初始值为1
			while(true){//死循环
				//求乘积，让s每次自动乘以每个循环到的i

				if(i === 20){//如果i是20
					break//强制结束循环

				i++
