<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    async function sleep(delay) {
      return new Promise((resolve) => {
        setTimeout(() => {
          console.log("苏醒")
          resolve()
        }, delay)
      })
    }
    const popup = window.open(
      'about:blank',
      'popup',
      'width=500,height=500,left=100,top=100'
    )
    popup.document.write('<h1>可以调整大小的窗口</h1>')
    async function foo() {
      await sleep(2000)
      popup.resizeTo(500, 500)
      await sleep(2000)
      popup.resizeTo(600, 600)
    }
    foo()
  </script>
</body>

</html>
