<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    class BrowserDetector {
      constructor() {
        const ua = navigator.userAgent

        // IE
        this.isIE = !!document.documentMode || /*@cc_on!@*/false

        // 新版 Edge (Chromium)
        this.isEdgeChromium = ua.includes('Edg')

        // 旧版 Edge (EdgeHTML)
        this.isEdgeLegacy = !!window.StyleMedia && !this.isEdgeChromium

        // Firefox
        this.isFirefox = typeof InstallTrigger !== 'undefined'

        // Chrome
        this.isChrome = !!window.chrome?.webstore && !ua.includes('Edg') && !window.opr

        // Opera
        this.isOpera = !!window.opr?.addons

        // Safari
        this.isSafari = /^((?!chrome|android).)*safari/i.test(ua) && !this.isChrome
      }

      get name() {
        if (this.isIE) return 'IE'
        if (this.isEdgeChromium) return 'Edge (Chromium)'
        if (this.isEdgeLegacy) return 'Edge (Legacy)'
        if (this.isFirefox) return 'Firefox'
        if (this.isChrome) return 'Chrome'
        if (this.isOpera) return 'Opera'
        if (this.isSafari) return 'Safari'
        return 'Unknown'
      }
    }
    const BD = new BrowserDetector()
    console.log(BD.name)

  </script>
</body>

</html>
