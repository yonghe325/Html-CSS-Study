<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box {
      margin: 0 auto;
      overflow: auto;
      width: 400px;
      height: 400px;
      background-color: red;
    }

    .inner {
      display: flex;
      justify-content: space-between;
      justify-items: center;
      margin: 0 auto;
      width: 500px;
      height: 500px;
      background-color: blue;
    }

    .small {
      width: 50px;
      height: 50px;
      background-color: yellow;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="inner">
      <div class="small"></div>
      <div class="small"></div>
      <div class="small"></div>
      <div class="small"></div>
      <div class="small"></div>
      <div class="small"></div>
    </div>
  </div>
  <script>
    const smalls = document.querySelectorAll(".small")
    for (let i = 0; i < smalls.length; i++) {
      const ops = smalls[i].getBoundingClientRect()
      console.log(`第${i+1}个`);
      console.log("width : "+ops.width);
      console.log("height : "+ops.height);
      console.log("top : "+ops.top);
      console.log("left : "+ops.left);
      console.log("right : "+ops.right);
      console.log("bottom : "+ops.bottom);
    }

  </script>
</body>

</html>
